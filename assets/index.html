<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Monitor Debugger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@zendeskgarden/css-bedrock@8.0.0">
    <style>
        body { padding: 10px; font-family: system-ui, -apple-system, sans-serif; color: #2f3941; }
        .btn { background: #1f73b7; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: #144a75; }
        .error { color: #d93f4c; font-weight: bold; padding: 10px; background: #fff4f5; border: 1px solid #d93f4c; margin-top: 10px; }
        .success { color: #03a84e; font-weight: bold; padding: 10px; background: #edfbf1; border: 1px solid #03a84e; margin-top: 10px; }
        .debug-info { background: #eee; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; border: 1px solid #ccc; }
        .label { font-weight: bold; display: block; margin-top: 5px; }
        
        /* Standard App Styles */
        .alert-box { background: #fff4f5; border-left: 4px solid #d93f4c; padding: 15px; margin-bottom: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <h3>🔍 Monitor Status</h3>
        
        <div id="status-area">Initializing...</div>

        <div id="instruction-area" class="alert-box hidden">
            <strong>⚠️ INSTRUCTION FOUND:</strong><br>
            <span id="instruction-text"></span>
        </div>

        <button class="btn" onclick="manualRun()">🔄 Run Check & Debug</button>

        <div id="debug-log" class="debug-info hidden"></div>
    </div>

    <script type="text/javascript" src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
    <script>
        var client = ZAFClient.init();
        client.invoke('resize', { width: '100%', height: '500px' }); // Made taller for debug info

        // CONFIG: FIELD NAMES
        // If your Zendesk fields are named differently, UPDATE THESE!
        const CONFIG = {
            tourId: "Tour Id",
            vendorId: "Vendor Id",
            city: "City",
            date: "Tour Date",
            time: "Start time",
            completion: "Completion Type"
        };

        client.on('app.registered', function() {
            manualRun();
        });

        async function manualRun() {
            log("Running check...", true);
            
            try {
                // 1. GET SETTINGS
                const metadata = await client.metadata();
                const scriptUrl = metadata.settings.scriptUrl;
                
                if (!scriptUrl) {
                    log("❌ ERROR: 'scriptUrl' is missing in App Settings.", false);
                    return;
                }
                log(`✅ Script URL found: ...${scriptUrl.substr(-10)}`, false);

                // 2. GET TICKET DATA
                const context = await client.get('ticketFields');
                const ticket = await client.get('ticket');
                const fields = context.ticketFields;

                // Helper to find value
                const getVal = (targetLabel) => {
                    const fieldDef = fields.find(f => f.label === targetLabel);
                    if (!fieldDef) return "FIELD_NOT_FOUND"; // This helps us debug names!
                    const val = ticket.ticket[`customField:custom_field_${fieldDef.id}`];
                    return val === undefined || val === null ? "" : val;
                };

                // Read Values
                const data = {
                    tourId: getVal(CONFIG.tourId),
                    vendorId: getVal(CONFIG.vendorId),
                    city: getVal(CONFIG.city),
                    date: getVal(CONFIG.date),
                    time: getVal(CONFIG.time)
                };

                // Print what we found
                log("--- TICKET DATA ---", false);
                log(`Tour ID:  ${data.tourId}  (${data.tourId === "FIELD_NOT_FOUND" ? "❌ Name Mismatch" : "✅"})`, false);
                log(`Vendor ID: ${data.vendorId} (${data.vendorId === "FIELD_NOT_FOUND" ? "❌ Name Mismatch" : "✅"})`, false);
                log(`City:     ${data.city}      (${data.city === "FIELD_NOT_FOUND" ? "❌ Name Mismatch" : "✅"})`, false);
                log(`Date:     ${data.date}`, false);
                log(`Time:     ${data.time}`, false);

                // 3. CHECK INSTRUCTIONS
                if (data.tourId && data.vendorId && data.tourId !== "FIELD_NOT_FOUND") {
                    log("\n--- CHECKING GOOGLE SHEET ---", false);
                    try {
                        const url = `${scriptUrl}?tourId=${encodeURIComponent(data.tourId)}&vendorId=${encodeURIComponent(data.vendorId)}`;
                        const response = await client.request({ url: url, type: 'GET', cors: true });
                        const json = typeof response === 'string' ? JSON.parse(response) : response;
                        
                        log(`Server Response: ${JSON.stringify(json)}`, false);

                        if (json.found) {
                            document.getElementById('instruction-area').classList.remove('hidden');
                            document.getElementById('instruction-text').innerText = json.instructions;
                            document.getElementById('status-area').innerHTML = "<div class='success'>✅ Instructions Found!</div>";
                        } else {
                            document.getElementById('instruction-area').classList.add('hidden');
                            document.getElementById('status-area').innerHTML = "<div>No instructions found for this ID.</div>";
                        }
                    } catch (netErr) {
                        log(`❌ Network Error: ${netErr.message}`, false);
                        document.getElementById('status-area').innerHTML = "<div class='error'>Connection Failed</div>";
                    }
                } else {
                    log("Skipping Sheet Check: Missing Tour ID", false);
                }

            } catch (err) {
                log(`❌ CRITICAL ERROR: ${err.message}`, false);
                console.error(err);
            }
        }

        function log(msg, clear) {
            const el = document.getElementById('debug-log');
            el.classList.remove('hidden');
            if (clear) el.innerText = msg + "\n";
            else el.innerText += msg + "\n";
        }
    </script>
</body>
</html>
