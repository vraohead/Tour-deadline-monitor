<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour Monitor Diagnostic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@zendeskgarden/css-bedrock@8.0.0">
    <style>
        body { padding: 10px; font-family: system-ui, -apple-system, sans-serif; color: #2f3941; }
        h3 { font-size: 12px; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 0; }
        
        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn { width: 100%; padding: 10px; border: 1px solid transparent; border-radius: 4px; cursor: pointer; text-align: left; font-size: 13px; display: flex; align-items: center; }
        .btn:hover { opacity: 0.9; }
        .btn-icon { margin-right: 8px; font-weight: bold; font-size: 14px; }
        
        /* Colors */
        .btn-dark { background: #2f3941; color: white; } 
        .btn-blue { background: #eef4f9; color: #1f73b7; border-color: #1f73b7; } 
        .btn-green{ background: #edfbf1; color: #03a84e; border-color: #03a84e; } 
        .btn-red  { background: #fff4f5; color: #d93f4c; border-color: #d93f4c; } /* Deadline */
        .btn-yellow{ background: #fff7d1; color: #8a6d3b; border-color: #faebcc; } /* Instructions */

        /* Output Logs */
        .log-box { background: #f8f9f9; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 11px; border: 1px solid #ccc; margin-top: 10px; display: none; word-break: break-all; max-height: 200px; overflow-y: auto; }
        .visible { display: block; }

        /* Modal Styles */
        .modal-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; font-family: system-ui; }
        .modal-icon { font-size: 48px; margin-bottom: 15px; }
        .modal-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .modal-box { padding: 15px; border-radius: 8px; font-size: 16px; margin-bottom: 20px; width: 100%; box-sizing: border-box; line-height: 1.5; }
        
        /* Modal Variants */
        .variant-deadline .modal-title { color: #d93f4c; }
        .variant-deadline .modal-box { background: #fff4f5; border: 1px solid #eecdd0; color: #d93f4c; font-weight: bold; }
        .variant-deadline .btn-large { background: #d93f4c; }

        .variant-instr .modal-title { color: #b58105; }
        .variant-instr .modal-box { background: #fff8e1; border: 1px solid #f9eeb6; color: #2f3941; }
        .variant-instr .btn-large { background: #1f73b7; }

        .btn-large { color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/javascript" src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
    <script>
        var client = ZAFClient.init();

        // =========================================================
        // ⚙️ YOUR CONFIGURATION (HARDCODED IDs)
        // =========================================================
        const FIELD_IDS = {
            tourId: 360024232711,
            vendorId: 360024198072,
            startTime: 360021522271,
            city: 360021522151,
            tourDate: 360024232231
        };
        // =========================================================

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const type = params.get('type'); // 'deadline' or 'instr'
        const msg = params.get('msg');

        if (mode === 'modal') {
            renderModal(type, msg);
        } else {
            renderSidebar();
        }

        // --- SIDEBAR UI (DIAGNOSTIC PANEL) ---
        function renderSidebar() {
            client.invoke('resize', { width: '100%', height: '550px' });
            document.getElementById('app').innerHTML = `
                <h3>🛠️ DIAGNOSTIC PANEL</h3>
                <div class="btn-group">
                    
                    <button class="btn btn-blue" onclick="testDataFetch()">
                        <span class="btn-icon">📋</span> 1. Test Ticket Data
                    </button>
                    <div id="log-data" class="log-box"></div>

                    <button class="btn btn-green" onclick="testScriptConnection()">
                        <span class="btn-icon">☁️</span> 2. Test Google Sheet
                    </button>
                    <div id="log-script" class="log-box"></div>

                    <div style="border-top:1px solid #eee; margin-top:5px; padding-top:10px;">
                        <span style="font-size:10px; font-weight:bold; color:#999; display:block; margin-bottom:5px;">VISUAL POPUP TESTS</span>
                        
                        <button class="btn btn-red" onclick="forceModal('deadline')">
                            <span class="btn-icon">🛑</span> 3a. Simulate "Deadline Passed"
                        </button>

                        <button class="btn btn-yellow" onclick="forceModal('instr')">
                            <span class="btn-icon">⚠️</span> 3b. Simulate "Instructions"
                        </button>
                    </div>

                    <button class="btn btn-dark" style="margin-top:10px" onclick="testNote()">
                        <span class="btn-icon">📝</span> 4. Test Internal Note
                    </button>
                </div>
            `;
        }

        // --- TEST 1: READ DATA ---
        async function testDataFetch() {
            const log = showLog('log-data', "Reading...");
            try {
                const ticket = await client.get('ticket');
                const t = ticket.ticket;

                const tID = t[`customField:custom_field_${FIELD_IDS.tourId}`];
                const vID = t[`customField:custom_field_${FIELD_IDS.vendorId}`];
                const city = t[`customField:custom_field_${FIELD_IDS.city}`];
                const date = t[`customField:custom_field_${FIELD_IDS.tourDate}`];
                const time = t[`customField:custom_field_${FIELD_IDS.startTime}`];

                let output = "--- DATA FOUND ---\n";
                output += `Tour ID (${FIELD_IDS.tourId}): ${tID}\n`;
                output += `Vendor ID (${FIELD_IDS.vendorId}): ${vID}\n`;
                output += `City: ${city}\n`;
                output += `Date: ${date}\n`;
                output += `Time: ${time}\n`;

                if (tID === undefined) output += "\n⚠️ TourID is undefined. Did you save the ticket?";
                
                log.innerText = output;
                return { tID, vID };
            } catch (e) {
                log.innerText = "Error: " + e.message;
                return null;
            }
        }

        // --- TEST 2: GOOGLE SHEET ---
        async function testScriptConnection() {
            const log = showLog('log-script', "Connecting...");
            
            // 1. Get Values
            const data = await testDataFetch();
            if (!data || !data.tID || !data.vID) {
                log.innerText += "\n❌ Aborting: Missing Ticket Data.";
                return;
            }

            // 2. Get URL
            const metadata = await client.metadata();
            const scriptUrl = metadata.settings.scriptUrl;
            if (!scriptUrl) {
                log.innerText += "\n❌ Aborting: No Script URL in Settings.";
                return;
            }

            // 3. Call
            try {
                const response = await client.request({
                    url: `${scriptUrl}?tourId=${encodeURIComponent(data.tID)}&vendorId=${encodeURIComponent(data.vID)}`,
                    type: 'GET',
                    cors: true
                });

                const res = JSON.parse(response);
                let out = `\n✅ SERVER RESPONSE:\nFound: ${res.found}\nInstructions: "${res.instructions}"`;
                
                if (res.found) {
                    out += "\n\n(This means the row exists and checkbox is TRUE)";
                } else {
                    out += "\n\n(If this is false, check Column D in your Sheet)";
                }
                
                log.innerText = out;

            } catch (e) {
                log.innerText = "Network Error: " + e.message;
            }
        }

        // --- TEST 3: FORCE MODALS ---
        function forceModal(type) {
            let msg = "";
            if (type === 'deadline') {
                msg = "Tour has passed! Fulfilling this may require a refund.";
            } else {
                msg = "Please verify the age of the child for this specific tour.";
            }

            client.invoke('instances.create', {
                location: 'modal',
                url: `assets/index.html?mode=modal&type=${type}&msg=${encodeURIComponent(msg)}`,
                size: { width: '600px', height: '400px' }
            });
        }

        // --- TEST 4: NOTE ---
        function testNote() {
            client.invoke('ticket.comment.appendText', "✅ Test Note: Control Panel Working.")
                .then(() => client.invoke('notify', 'Note Added Successfully'))
                .catch(err => client.invoke('notify', 'Error: ' + err.message, 'error'));
        }

        // --- MODAL RENDER LOGIC ---
        function renderModal(type, msgText) {
            const safeMsg = decodeURIComponent(msgText || "");
            
            let icon = "⚠️";
            let title = "SPECIAL INSTRUCTIONS";
            let cssClass = "variant-instr";

            if (type === 'deadline') {
                icon = "🛑";
                title = "DEADLINE PASSED";
                cssClass = "variant-deadline";
            }

            document.getElementById('app').innerHTML = `
                <div class="modal-wrapper ${cssClass}">
                    <div class="modal-icon">${icon}</div>
                    <div class="modal-title">${title}</div>
                    <div class="modal-box">
                        ${safeMsg}
                    </div>
                    <button class="btn-large" onclick="ack('${type}')">
                        I ACKNOWLEDGE
                    </button>
                </div>
            `;
        }

        function ack(type) {
            const note = type === 'deadline' 
                ? "🛑 Agent acknowledged DEADLINE PASSED warning." 
                : "✅ Agent acknowledged Special Instructions.";
                
            client.invoke('ticket.comment.appendText', note);
            client.invoke('destroy');
        }

        function showLog(id, text) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.classList.add('visible');
            return el;
        }
    </script>
</body>
</html>
