<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@zendeskgarden/css-bedrock@8.0.0">
    <style>
        body { padding: 10px; font-family: system-ui, -apple-system, sans-serif; color: #2f3941; }
        .hidden { display: none; }
        
        /* Status Box */
        .status-box { padding: 10px; border-radius: 4px; background: #f8f9f9; border: 1px solid #d8dcde; margin-bottom: 10px; text-align: center; font-size: 13px; }
        .status-loading { color: #1f73b7; font-weight: bold; }
        .status-active { background: #fff4f5; color: #d93f4c; border-color: #d93f4c; font-weight: bold; }
        .status-clean { color: #03a84e; }
        
        .btn { width: 100%; padding: 8px; background: #1f73b7; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .btn:hover { background: #144a75; }

        /* Modal Styles */
        .modal-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; }
        .warning-icon { font-size: 64px; margin-bottom: 20px; }
        .modal-title { font-size: 24px; font-weight: bold; color: #d93f4c; margin-bottom: 15px; }
        .modal-text { font-size: 16px; line-height: 1.6; color: #2f3941; margin-bottom: 30px; background: #fff4f5; padding: 15px; border-radius: 8px; border: 1px solid #eecdd0; width: 100%; }
        .btn-large { padding: 15px 40px; font-size: 16px; background: #d93f4c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/javascript" src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
    <script>
        var client = ZAFClient.init();

        // =========================================================
        // ⚙️ CONFIGURATION (PRE-FILLED WITH YOUR IDs)
        // =========================================================
        const FIELD_IDS = {
            tourId: 360024232711,
            vendorId: 360024198072,
            startTime: 360021522271,
            city: 360021522151,
            tourDate: 360024232231
        };
        // =========================================================

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const instrData = params.get('instr');

        if (mode === 'modal') {
            renderModal(instrData);
        } else {
            renderSidebar();
            // Auto-run when app loads
            client.on('app.registered', function() {
                runChecks();
            });
        }

        // --- SIDEBAR LOGIC ---
        function renderSidebar() {
            client.invoke('resize', { width: '100%', height: '150px' });
            document.getElementById('app').innerHTML = `
                <div id="status-display" class="status-box">
                    <div class="status-loading">Initializing...</div>
                </div>
                <button class="btn" onclick="runChecks()">🔄 Check Now</button>
            `;
        }

        async function runChecks() {
            const statusEl = document.getElementById('status-display');
            statusEl.innerHTML = '<div class="status-loading">⏳ Checking...</div>';

            try {
                // 1. Get Data from Ticket
                const ticket = await client.get('ticket');
                const tData = ticket.ticket;

                // Grab values using YOUR IDs
                const tid = tData[`customField:custom_field_${FIELD_IDS.tourId}`];
                const vid = tData[`customField:custom_field_${FIELD_IDS.vendorId}`];

                // 2. Check Google Sheet (Instructions)
                if (tid && vid) {
                    const metadata = await client.metadata();
                    const scriptUrl = metadata.settings.scriptUrl;

                    if (scriptUrl) {
                        const response = await client.request({
                            url: `${scriptUrl}?tourId=${encodeURIComponent(tid)}&vendorId=${encodeURIComponent(vid)}`,
                            type: 'GET',
                            cors: true
                        });
                        const result = JSON.parse(response);

                        if (result.found) {
                            statusEl.innerHTML = '<div class="status-active">⚠️ INSTRUCTIONS FOUND</div>';
                            // Launch Popup
                            client.invoke('instances.create', {
                                location: 'modal',
                                url: `assets/index.html?mode=modal&instr=${encodeURIComponent(result.instructions)}`,
                                size: { width: '600px', height: '450px' }
                            });
                            return; // Stop here if instructions found
                        }
                    }
                }

                // 3. If no instructions, show clear
                statusEl.innerHTML = '<div class="status-clean">✓ No Special Instructions</div>';

            } catch (e) {
                console.error(e);
                statusEl.innerHTML = `<div style="color:red; font-size:10px;">Error: ${e.message}</div>`;
            }
        }

        // --- MODAL LOGIC (POPUP) ---
        function renderModal(instr) {
            document.getElementById('app').innerHTML = `
                <div class="modal-wrapper">
                    <div class="warning-icon">⚠️</div>
                    <div class="modal-title">IMPORTANT INSTRUCTIONS</div>
                    <div class="modal-text">${decodeURIComponent(instr || "No details provided.")}</div>
                    
                    <button class="btn-large" onclick="ack()">
                        I ACKNOWLEDGE
                    </button>
                </div>
            `;
        }

        function ack() {
            client.invoke('ticket.comment.appendText', "✅ Agent acknowledged special instructions.");
            client.invoke('destroy');
        }
    </script>
</body>
</html>
