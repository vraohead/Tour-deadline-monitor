<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@zendeskgarden/css-bedrock@8.0.0">
    <style>
        body { padding: 10px; font-family: system-ui, -apple-system, sans-serif; color: #2f3941; }
        .hidden { display: none; }
        
        /* SIDEBAR STATUS STYLES */
        .status-box { padding: 10px; border-radius: 4px; background: #f8f9f9; border: 1px solid #d8dcde; margin-bottom: 10px; text-align: center; }
        .status-loading { color: #1f73b7; font-weight: bold; }
        .status-active { background: #fff4f5; color: #d93f4c; border-color: #d93f4c; font-weight: bold; }
        .status-clean { color: #03a84e; }
        
        .btn { width: 100%; padding: 8px; background: #1f73b7; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .btn:hover { background: #144a75; }

        /* MODAL STYLES (THE POPUP) */
        .modal-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; }
        .warning-icon { font-size: 64px; margin-bottom: 20px; }
        .modal-title { font-size: 24px; font-weight: bold; color: #d93f4c; margin-bottom: 15px; }
        .modal-text { font-size: 16px; line-height: 1.6; color: #2f3941; margin-bottom: 30px; background: #fff4f5; padding: 15px; border-radius: 8px; border: 1px solid #eecdd0; width: 100%; }
        .btn-large { padding: 15px 40px; font-size: 16px; background: #d93f4c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-large:hover { background: #a81825; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/javascript" src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
    <script>
        var client = ZAFClient.init();

        // 1. DETECT MODE: Are we in the Sidebar or the Popup?
        const params = new URLSearchParams(window.location.search);
        const isModal = params.get('mode') === 'modal';
        const instructionsParam = params.get('instr'); // Instructions passed to modal

        if (isModal) {
            renderModal(instructionsParam);
        } else {
            // Sidebar Mode
            client.invoke('resize', { width: '100%', height: '180px' });
            renderSidebar();
            
            // AUTO-RUN ON LOAD
            client.on('app.registered', function() {
                checkTicketAutomatically();
            });
        }

        // ==========================================
        // SIDEBAR LOGIC (Background Checker)
        // ==========================================
        function renderSidebar() {
            document.getElementById('app').innerHTML = `
                <div id="status-display" class="status-box">
                    <div class="status-loading">Initializing Monitor...</div>
                </div>
                <div style="font-size: 10px; color: #aaa; text-align: center;">V4.0 Auto-Live</div>
                <button class="btn" onclick="checkTicketAutomatically()">🔄 Force Re-Check</button>
            `;
        }

        async function checkTicketAutomatically() {
            const statusEl = document.getElementById('status-display');
            statusEl.innerHTML = '<div class="status-loading">⏳ Checking Sheet...</div>';

            try {
                // 1. Get Settings
                const metadata = await client.metadata();
                const scriptUrl = metadata.settings.scriptUrl;
                if (!scriptUrl) throw new Error("Please set Script URL in App Settings");

                // 2. Safe Field Scanning (Fixes 'toLowerCase' error)
                const context = await client.get('ticketFields');
                const ticketData = await client.get('ticket');
                
                // Helper to find ID safely using Regex (Case Insensitive)
                const findValue = (regex) => {
                    const field = context.ticketFields.find(f => {
                        // FIX: Handle null labels safely
                        const label = f.label || ""; 
                        return regex.test(label);
                    });
                    if (!field) return null;
                    return ticketData.ticket[`customField:custom_field_${field.id}`];
                };

                // Find fields regardless of slight spelling diffs
                const tid = findValue(/tour\s*id/i);
                const vid = findValue(/vendor\s*id/i);

                if (!tid || !vid) {
                    statusEl.innerHTML = '<div style="color:#666">Waiting for Tour ID & Vendor ID...</div>';
                    return;
                }

                // 3. Call Google Script
                const response = await client.request({
                    url: `${scriptUrl}?tourId=${encodeURIComponent(tid)}&vendorId=${encodeURIComponent(vid)}`,
                    type: 'GET',
                    cors: true
                });

                const data = JSON.parse(response);

                if (data.found) {
                    // FOUND! Show Red Status & Trigger Popup
                    statusEl.innerHTML = '<div class="status-active">⚠️ INSTRUCTIONS FOUND</div>';
                    
                    // OPEN THE MODAL POPUP AUTOMATICALLY
                    client.invoke('instances.create', {
                        location: 'modal',
                        url: `assets/index.html?mode=modal&instr=${encodeURIComponent(data.instructions)}`,
                        size: { width: '600px', height: '450px' }
                    });

                } else {
                    // Not Found or Checkbox not checked
                    statusEl.innerHTML = '<div class="status-clean">✓ No Special Instructions</div>';
                }

            } catch (e) {
                console.error(e);
                statusEl.innerHTML = `<div style="color:red; font-size:10px;">Error: ${e.message}</div>`;
            }
        }

        // ==========================================
        // MODAL LOGIC (The Actual Popup)
        // ==========================================
        function renderModal(instructions) {
            document.getElementById('app').innerHTML = `
                <div class="modal-wrapper">
                    <div class="warning-icon">⚠️</div>
                    <div class="modal-title">IMPORTANT INSTRUCTIONS</div>
                    <div class="modal-text">${decodeURIComponent(instructions || "No details provided.")}</div>
                    
                    <button class="btn-large" onclick="acknowledge()">
                        I ACKNOWLEDGE
                    </button>
                </div>
            `;
        }

        function acknowledge() {
            // Add note and close
            client.invoke('ticket.comment.appendText', "✅ Agent acknowledged special instructions popup.");
            client.invoke('destroy'); // Closes the modal
        }
    </script>
</body>
</html>
